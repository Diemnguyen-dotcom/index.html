<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chatbot Pháp Luật Lao Động</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;

            /* ẢNH NỀN BẠN YÊU CẦU */
            background-image: url("https://i.pinimg.com/1200x/0b/34/ec/0b34ec9d82686ccf45d06a6b3c3623e9.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* LAYOUT CHIA 2 CỘT */
        .layout {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            background: rgba(43, 124, 255, 0.9);
            padding: 30px 20px;
            color: white;
            font-size: 18px;
            font-weight: 500;
        }

        .sidebar-item {
            margin-bottom: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar-item:hover {
            font-weight: bold;
            transform: translateX(4px);
        }

        /* KHUNG CHAT TÁCH RIÊNG */
        .chat-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .chat-wrapper {
            width: 480px; /* nhỏ lại */
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .header {
            background: #2b7cff;
            color: white;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        #chat {
            height: 420px; /* nhỏ lại */
            overflow-y: auto;
            padding: 22px;
        }

        .msg {
            margin-bottom: 18px;
            display: flex;
        }

        .msg.user {
            justify-content: flex-end;
        }

        .msg.bot {
            justify-content: flex-start;
        }

        .msg span {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 75%;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.25s ease-in-out;
        }

        .user span {
            background: #d9eaff;
        }

        .bot span {
            background: #f1f1f1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background: white;
        }

        #input {
            flex: 1;
            padding: 14px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        button {
            background: #2b7cff;
            color: white;
            border: none;
            padding: 0 24px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1a5ed8;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-item">Hỏi đáp</div>
        <div class="sidebar-item">Hợp đồng</div>
        <div class="sidebar-item">Tài liệu</div>
        <div class="sidebar-item">Giới thiệu</div>
    </div>

    <!-- KHUNG CHAT TÁCH RIÊNG -->
    <div class="chat-area">
        <div class="chat-wrapper">
            <div class="header">Chatbot Pháp Luật Lao Động</div>

            <div id="chat"></div>

            <div class="input-area">
                <input id="input" type="text" placeholder="Nhập câu hỏi...">
                <button onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>

</div>

<script>
    const API_URL = "https://baffling-powdering-amuck.ngrok-free.dev/chat";

    async function sendMessage() {
        const input = document.getElementById("input");
        const chat = document.getElementById("chat");

        const userMsg = input.value.trim();
        if (!userMsg) return;

        chat.innerHTML += `<div class="msg user"><span>${userMsg}</span></div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMsg })
        });

        const data = await res.json();
        chat.innerHTML += `<div class="msg bot"><span>${data.answer}</span></div>`;
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
